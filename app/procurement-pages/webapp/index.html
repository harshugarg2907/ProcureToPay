<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Pages</title>
    <link rel="stylesheet" href="./procurement.css">
    <script src="./procurement.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Procurement</p>
        <h1>Procurement Pages</h1>
      </div>
      <a class="button" href="/dashboard/index.html">Dashboard</a>
    </header>
    <main class="page">
      <section class="tabs">
        <button class="tab active" data-target="prs" type="button">Requisitions</button>
        <button class="tab" data-target="rfqs" type="button">RFQs</button>
        <button class="tab" data-target="pos" type="button">Purchase Orders</button>
      </section>
      <section id="prs" class="panel active">
        <h2>Requisitions</h2>
        <table><thead><tr><th>PR Number</th><th>Requisitioner</th><th>Purchasing Org</th><th>Status</th></tr></thead><tbody id="prsBody"></tbody></table>
      </section>
      <section id="rfqs" class="panel">
        <h2>RFQs</h2>
        <table><thead><tr><th>RFQ Number</th><th>Purchasing Org</th><th>Deadline</th><th>Status</th></tr></thead><tbody id="rfqsBody"></tbody></table>
      </section>
      <section id="pos" class="panel">
        <h2>Purchase Orders</h2>
        <table><thead><tr><th>PO Number</th><th>Vendor</th><th>Net Value</th><th>Status</th></tr></thead><tbody id="posBody"></tbody></table>
      </section>
      <p id="message" class="message"></p>
    </main>
  </body>
</html>
