<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Procurement System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #334155
            );
            color: white;
        }

        .container {
            text-align: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid white;
            border-radius: 50%;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        h1 {
            margin-top: 20px;
            font-size: 28px;
        }

        p {
            margin-top: 10px;
            opacity: 0.8;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        setTimeout(function () {
            window.location.href = "/p2p-ui/index.html";
        }, 3000);
    </script>

</head>

<body>

    <div class="container">
        <div class="loader"></div>

        <h1>Procure To Pay (P2P)</h1>

        <p>
            Opening Fiori Launchpad...
        </p>
    </div>

</body>
</html>
