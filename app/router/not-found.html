<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Procure To Pay</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #12213a;
      --muted: #64748b;
      --line: #dbe7f3;
      --primary: #0064d9;
      --primary-dark: #074da2;
      --accent: #11a683;
      --surface: rgba(255, 255, 255, 0.92);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(17, 166, 131, 0.20), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(0, 100, 217, 0.22), transparent 30%),
        linear-gradient(135deg, #f8fbff 0%, #edf5ff 45%, #eefcf8 100%);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    main {
      width: min(980px, 100%);
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 40px;
      padding: 44px;
      border: 1px solid rgba(219, 231, 243, 0.9);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(18, 33, 58, 0.14);
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 100, 217, 0.10);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 22px 0 14px;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    a:hover {
      transform: translateY(-2px);
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 12px 26px rgba(0, 100, 217, 0.24);
    }

    .secondary {
      color: var(--primary-dark);
      border: 1px solid var(--line);
      background: #fff;
    }

    .visual {
      position: relative;
      min-height: 360px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: min(360px, 100%);
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(18, 33, 58, 0.12);
    }

    .panel-top {
      display: flex;
      gap: 8px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6b6b;
    }

    .dot:nth-child(2) {
      background: #ffbe4d;
    }

    .dot:nth-child(3) {
      background: #24c08a;
    }

    .route-line {
      height: 12px;
      margin-top: 18px;
      border-radius: 999px;
      background: #e7eef8;
      overflow: hidden;
    }

    .route-line span {
      display: block;
      width: 54%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .code {
      margin-top: 30px;
      font-size: clamp(72px, 12vw, 118px);
      line-height: 0.9;
      font-weight: 800;
      color: #e8f0fa;
      text-align: right;
    }

    .chip {
      position: absolute;
      right: 12px;
      bottom: 34px;
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      box-shadow: 0 14px 30px rgba(18, 33, 58, 0.20);
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      main {
        min-height: auto;
        grid-template-columns: 1fr;
        padding: 28px;
        gap: 18px;
      }

      .visual {
        min-height: 280px;
        order: -1;
      }

      .chip {
        right: 0;
        bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section aria-labelledby="page-title">
      <div class="badge">404 - Route not found</div>
      <h1 id="page-title">This page took a wrong turn.</h1>
      <p>
        The URL does not match any Procure To Pay screen. Use one of the links below to get back to a valid page.
      </p>
      <div class="actions">
        <a class="primary" href="/home/index.html">Go to Home</a>
        <!-- <a class="secondary" href="/home/index.html">Go to Home</a> -->
      </div>
    </section>

    <section class="visual" aria-hidden="true">
      <div class="panel">
        <div class="panel-top">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="route-line"><span></span></div>
        <div class="route-line"><span style="width: 78%;"></span></div>
        <div class="route-line"><span style="width: 38%;"></span></div>
        <div class="code">404</div>
      </div>
      <div class="chip">Sorry.....</div>
    </section>
  </main>
</body>
</html>
