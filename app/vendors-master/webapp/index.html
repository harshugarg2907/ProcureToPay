<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Master</title>
    <link rel="stylesheet" href="./vendors.css">
    <script src="./vendors.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Master Data</p>
        <h1>Vendor Master</h1>
      </div>
      <a class="button" href="/dashboard/index.html">Dashboard</a>
    </header>
    <main class="page">
      <section class="grid">
        <article>
          <h2>Vendors</h2>
          <table><thead><tr><th>Vendor</th><th>Name</th><th>City</th><th>Status</th></tr></thead><tbody id="vendorsBody"></tbody></table>
        </article>
        <article>
          <h2>Materials</h2>
          <table><thead><tr><th>Material</th><th>Description</th><th>Plant</th><th>Price</th></tr></thead><tbody id="materialsBody"></tbody></table>
        </article>
        <article>
          <h2>Purchase Orders</h2>
          <table><thead><tr><th>PO Number</th><th>Vendor</th><th>Net Value</th><th>Status</th></tr></thead><tbody id="ordersBody"></tbody></table>
        </article>
      </section>
      <p id="message" class="message"></p>
    </main>
  </body>
</html>
