_schema-version: "3.3"
ID: sap-cap-p2p
version: 1.0.0
description: SAP CAP Procure-to-Pay application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - npm run build:router-resources

modules:
  - name: sap-cap-p2p-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: sap-cap-p2p-db
  - name: sap-cap-p2p-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-cap-p2p-db
      - name: sap-cap-p2p-auth
      - name: sap-cap-p2p-destination
  - name: sap-cap-p2p
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sap-cap-p2p-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: sap-cap-p2p-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sap-cap-p2p-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'P2P_ADMIN'
            description: 'Full Procure-to-Pay administration'
            role-template-references:
              - '$XSAPPNAME.P2P_ADMIN'
          - name: 'P2P_BUYER'
            description: 'Buyer access for RFQs and purchase orders'
            role-template-references:
              - '$XSAPPNAME.P2P_BUYER'
          - name: 'P2P_REQUESTER'
            description: 'Purchase requisition requester access'
            role-template-references:
              - '$XSAPPNAME.P2P_REQUESTER'
          - name: 'P2P_VENDOR_MANAGER'
            description: 'Vendor and supplier master data access'
            role-template-references:
              - '$XSAPPNAME.P2P_VENDOR_MANAGER'
          - name: 'P2P_QUALITY_INSPECTOR'
            description: 'Quality inspection access'
            role-template-references:
              - '$XSAPPNAME.P2P_QUALITY_INSPECTOR'
          - name: 'P2P_AP_CLERK'
            description: 'Accounts payable invoice verification access'
            role-template-references:
              - '$XSAPPNAME.P2P_AP_CLERK'
          - name: 'P2P_FINANCE_MANAGER'
            description: 'Payment processing and finance approval access'
            role-template-references:
              - '$XSAPPNAME.P2P_FINANCE_MANAGER'
    requires:
      - name: app-api

  - name: sap-cap-p2p-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: sap-cap-p2p-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        version: 1.0.0
        init_data:
          instance:
            destinations:
              - Name: sap-cap-p2p-srv-api
                URL: ~{srv-api/srv-url}
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
            existing_destinations_policy: update
    requires:
      - name: srv-api

  - name: sap-cap-p2p-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: sap-cap-p2p-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
