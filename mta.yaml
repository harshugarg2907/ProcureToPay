_schema-version: "3.3"
ID: sap-cap-p2p
version: 1.0.0
description: SAP CAP Procure-to-Pay application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - npm run build:router-resources

modules:
  - name: sap-cap-p2p-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: sap-cap-p2p-db
  - name: sap-cap-p2p-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: sap-cap-p2p-db
      - name: sap-cap-p2p-auth
  - name: sap-cap-p2p
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: sap-cap-p2p-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: sap-cap-p2p-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: sap-cap-p2p-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Admin (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Admin'
          - name: 'ProcurementOfficer (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.ProcurementOfficer'
          - name: 'FinanceOfficer (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.FinanceOfficer'
          - name: 'Viewer (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Viewer'
          - name: 'QCInspector (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.QCInspector'
          - name: 'GoodsReceiptOfficer (sap-cap-p2p ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.GoodsReceiptOfficer'
    requires:
      - name: app-api

  - name: sap-cap-p2p-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
